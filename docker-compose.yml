services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  seeder:
    build: .
    command: node backend/seeder.js
    environment:
      - MONGO_URI=mongodb://mongo:27017/proshop
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  backend:
    build: .
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/proshop
    volumes:
      - ./backend:/app/backend
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    stdin_open: true
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
      - HOST=0.0.0.0
      - REACT_APP_API_URL=http://backend:5001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads:
